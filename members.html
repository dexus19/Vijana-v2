<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMOJA WVJ — Members</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://usrslbegigknkookofvr.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_3bSO7Ux9XJZC-zsJ9ly3EA_ipIL0sNJ';

const { createClient } = supabase;
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<style>
    <link rel="stylesheet" href="styles.css">
body{font-family:'Plus Jakarta Sans';margin:0;background:#f5f2ec}
.app{display:flex}
.sidebar{width:220px;background:#0f5c4a;color:#fff;height:100vh;position:fixed;padding:20px}
.main{margin-left:220px;width:100%}
.topbar{background:#fff;padding:15px 20px;border-bottom:1px solid #ddd}
.content{padding:20px}
.btn{padding:8px 12px;border:none;border-radius:6px;cursor:pointer}
.btn-primary{background:#0f5c4a;color:#fff}
.table-wrap{background:#fff;border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th,td{padding:10px;border-bottom:1px solid #eee}
</style>
</head>

<body>

<div class="app">
<div class="sidebar">
<h2>UMOJA WVJ</h2>
</div>

<div class="main">
<div class="topbar">
<button class="btn btn-primary" onclick="openAddMember()">Add Member</button>
</div>

<div class="content">
<div class="table-wrap">
<table>
<thead>
<tr>
<th>#</th>
<th>Name</th>
<th>Phone</th>
<th>Deposit</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="members-tbody"></tbody>
</table>
</div>
</div>
</div>
</div>

<!-- MODAL -->
<div id="modal" style="display:none;position:fixed;inset:0;background:#0005;align-items:center;justify-content:center">
<div style="background:#fff;padding:20px;border-radius:10px;width:300px">
<h3>Add Member</h3>
<input id="name" placeholder="Name"><br><br>
<input id="phone" placeholder="Phone"><br><br>
<input id="deposit" type="number" placeholder="Deposit"><br><br>
<button class="btn btn-primary" onclick="saveMember()">Save</button>
<button onclick="closeModal()">Cancel</button>
</div>
</div>

<script>
let editingId = null;

async function loadMembers(){
const {data,error} = await supabaseClient.from('members').select('*');
if(error){console.error(error);return [];}
return data;
}

async function render(){
const list = await loadMembers();
const tbody = document.getElementById('members-tbody');

tbody.innerHTML = list.map((m,i)=>`
<tr>
<td>${i+1}</td>
<td>${m.name}</td>
<td>${m.phone}</td>
<td>${m.total_deposit}</td>
<td>
<button onclick="edit(${m.id})">Edit</button>
<button onclick="del(${m.id})">Delete</button>
</td>
</tr>
`).join('');
}

function openAddMember(){
editingId=null;
document.getElementById('modal').style.display='flex';
}

function closeModal(){
document.getElementById('modal').style.display='none';
}

async function saveMember(){
const name=document.getElementById('name').value;
const phone=document.getElementById('phone').value;
const deposit=parseInt(document.getElementById('deposit').value)||0;

if(editingId){
await supabaseClient.from('members')
.update({name,phone,total_deposit:deposit})
.eq('id',editingId);
}else{
await supabaseClient.from('members')
.insert([{name,phone,total_deposit:deposit}]);
}

closeModal();
render();
}

async function edit(id){
const list = await loadMembers();
const m = list.find(x=>x.id===id);

editingId=id;
document.getElementById('name').value=m.name;
document.getElementById('phone').value=m.phone;
document.getElementById('deposit').value=m.total_deposit;

openAddMember();
}

async function del(id){
await supabaseClient.from('members').delete().eq('id',id);
render();
}

window.onload=render;
</script>

</body>
</html>
