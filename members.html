<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>UMOJA WVJ — Members</title>
</head>

<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="org-tag">Mkoba Family · TPB</div>
        <h1>UMOJA WVJ</h1>
        <div class="group-type">Group Manager v2.0 · Mar–Feb Cycle</div>
      </div>
      <nav>
        <div class="nav-item" onclick="window.location.href='dashboard.html'"><span class="icon">📊</span>Dashboard</div>
        <div class="nav-item active" onclick="window.location.href='members.html'"><span class="icon">👥</span>Members</div>
        <div class="nav-item" onclick="window.location.href='payments.html'"><span class="icon">💳</span>Payments</div>
        <div class="nav-item" onclick="window.location.href='michango.html'"><span class="icon">🎯</span>Matukio</div>
      </nav>
      <div class="sidebar-footer">© 2026 UMOJA WVJ GROUP</div>
    </aside>

    <!-- Main -->
    <div class="main">
      <div class="topbar">
        <div>
          <div class="topbar-title">Members</div>
          <div class="topbar-sub">All group members</div>
        </div>
        <div class="topbar-actions">
          <button class="btn btn-primary" onclick="openAddMember()">Add Member</button>
        </div>
      </div>

      <div class="content">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Deposit</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="members-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Members Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title">Add Member</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="JOHN DOE">
        </div>
        <div class="form-row">
          <label>Phone Number</label>
          <input type="text" id="phone" placeholder="255XXXXXXXXX">
        </div>
        <div class="form-row">
          <label>Total Deposit (TZS)</label>
          <input type="number" id="deposit" placeholder="0" min="0" step="1000">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveMember()">Save Member</button>
        <button class="btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://usrslbegigknkookofvr.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3bSO7Ux9XJZC-zsJ9ly3EA_ipIL0sNJ';
    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let editingId = null;

    async function loadMembers() {
      const { data, error } = await supabaseClient.from('members').select('*');
      if (error) {
        console.error(error);
        return [];
      }
      return data;
    }

    async function render() {
      const list = await loadMembers();
      const tbody = document.getElementById('members-tbody');

      tbody.innerHTML = list.map((m, i) => `
        <tr>
          <td>${i + 1}</td>
          <td>${m.name}</td>
          <td>${m.phone}</td>
          <td>${m.total_deposit}</td>
          <td>
            <button class="btn" onclick="edit(${m.id})">Edit</button>
            <button class="btn btn-danger" onclick="del(${m.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    }

    function openAddMember() {
      editingId = null;
      document.getElementById('modal-title').textContent = 'Add Member';
      document.getElementById('modal').classList.add('open');
      document.getElementById('name').value = '';
      document.getElementById('phone').value = '';
      document.getElementById('deposit').value = '';
    }

    function closeModal() {
      document.getElementById('modal').classList.remove('open');
    }

    async function saveMember() {
      const name = document.getElementById('name').value;
      const phone = document.getElementById('phone').value;
      const deposit = parseInt(document.getElementById('deposit').value) || 0;

      if (editingId) {
        await supabaseClient.from('members')
          .update({ name, phone, total_deposit: deposit })
          .eq('id', editingId);
      } else {
        await supabaseClient.from('members')
          .insert([{ name, phone, total_deposit: deposit }]);
      }

      closeModal();
      render();
    }

    async function edit(id) {
      const list = await loadMembers();
      const m = list.find(x => x.id === id);

      editingId = id;
      document.getElementById('modal-title').textContent = 'Edit Member';
      document.getElementById('name').value = m.name;
      document.getElementById('phone').value = m.phone;
      document.getElementById('deposit').value = m.total_deposit;

      openAddMember();
    }

    async function del(id) {
      if (confirm('Are you sure you want to delete this member?')) {
        await supabaseClient.from('members').delete().eq('id', id);
        render();
      }
    }

    window.onload = render;
  </script>
</body>
</html>
